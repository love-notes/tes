<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Notebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        .notebook-container {
            display: flex;
            background: #34495e;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            max-width: 1000px;
            width: 100%;
            height: 600px;
            position: relative;
        }

        /* Spiral Binding */
        .spiral-binding {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 40px;
            background: linear-gradient(90deg, #444 0%, #555 50%, #444 100%);
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 20px 0;
        }

        .spiral-ring {
            width: 24px;
            height: 12px;
            background: radial-gradient(ellipse at center, #666 0%, #333 100%);
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.8), 0 2px 4px rgba(255, 255, 255, 0.1);
        }

        /* Left Page */
        .page {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .page-left {
            background: linear-gradient(135deg, #f5f1e8 0%, #e8e3d8 100%);
            margin-right: 20px;
        }

        .page-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(0, 0, 0, 0.02) 1px, transparent 1px),
                radial-gradient(circle at 60% 40%, rgba(0, 0, 0, 0.01) 1px, transparent 1px);
            background-size: 100px 100px, 150px 150px;
            pointer-events: none;
            z-index: 1;
        }

        /* Right Page */
        .page-right {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            margin-left: 20px;
            position: relative;
        }

        .page-right::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23000" width="100" height="100"/><circle cx="20" cy="20" r="1" fill="%23333"/><circle cx="80" cy="40" r="1.5" fill="%23444"/><circle cx="40" cy="70" r="1" fill="%23222"/></svg>');
            opacity: 0.3;
            pointer-events: none;
        }

        .photo-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 60%;
            background: linear-gradient(135deg, rgba(100, 100, 100, 0.3) 0%, rgba(50, 50, 50, 0.5) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            text-align: center;
        }

        /* Text Content */
        .content {
            position: relative;
            z-index: 2;
        }

        .date-text {
            font-size: 24px;
            color: #2a2a2a;
            font-style: italic;
            margin-bottom: 20px;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .note-title {
            font-size: 18px;
            color: #444;
            margin-top: auto;
            letter-spacing: 3px;
            opacity: 0.6;
        }

        /* Notebook texture */
        .notebook-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: linear-gradient(
                90deg,
                transparent 0%,
                rgba(0, 0, 0, 0.1) 48%,
                rgba(0, 0, 0, 0.1) 52%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 5;
        }

        @media (max-width: 768px) {
            .notebook-container {
                flex-direction: column;
                height: auto;
            }

            .page {
                height: 400px;
            }

            .page-left {
                margin-right: 0;
                margin-bottom: 20px;
            }

            .page-right {
                margin-left: 0;
            }

            .spiral-binding {
                left: 0;
                right: 0;
                top: 50%;
                width: 100%;
                height: 40px;
                flex-direction: row;
                transform: translateY(-50%);
            }
        }
    </style>
</head>
<body>
    <div class="notebook-container">
        <!-- Spiral Binding -->
        <div class="spiral-binding">
            <div class="spiral-ring"></div>
            <div class="spiral-ring"></div>
            <div class="spiral-ring"></div>
            <div class="spiral-ring"></div>
            <div class="spiral-ring"></div>
            <div class="spiral-ring"></div>
            <div class="spiral-ring"></div>
            <div class="spiral-ring"></div>
        </div>

        <!-- Left Page -->
        <div class="page page-left">
            <div class="content">
                <div class="date-text">07.19.1996</div>
            </div>
            <div class="content">
                <div class="note-title">MONDAY/PM</div>
            </div>
        </div>

        <!-- Right Page -->
        <div class="page page-right">
            <div class="photo-placeholder">
                [Photo/Image Area]
            </div>
        </div>
    </div>
</body>
</html>
