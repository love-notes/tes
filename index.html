<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>made with love.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .photobook {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 600px;
            background: #1a1a1a;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            position: relative;
        }

        /* Spiral Binding */
        .spiral-binding {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            bottom: 0;
            width: 40px;
            background: linear-gradient(90deg, transparent 0%, #333 10%, #333 90%, transparent 100%);
            z-index: 50;
            pointer-events: none;
        }

        .spiral-ring {
            position: absolute;
            left: 50%;
            width: 28px;
            height: 16px;
            border: 3px solid #444;
            border-radius: 50%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse at 30% 30%, #555, #222);
        }

        /* Page 1 - Left Side */
        .page-1 {
            flex: 1;
            background: linear-gradient(135deg, #f5f5f0 0%, #e8e8e3 100%);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
        }

        .page-1::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
            pointer-events: none;
        }

        .page-1-content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .date-text {
            font-size: 18px;
            color: #333;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .made-with-love {
            font-size: 24px;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 15px 25px;
            border: 2px solid transparent;
            font-style: italic;
            letter-spacing: 1px;
        }

        .made-with-love:hover {
            transform: scale(1.05);
            color: #000;
            border: 2px solid #333;
            border-radius: 4px;
        }

        .signature {
            font-size: 14px;
            color: #555;
            letter-spacing: 2px;
            font-style: italic;
        }

        /* Page 2 - Right Side */
        .page-2 {
            flex: 1;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .carousel-container {
            position: relative;
            width: 300px;
            height: 400px;
            perspective: 1000px;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .photo-item {
            position: absolute;
            width: 280px;
            height: 380px;
            background: #333;
            border: 3px solid #f5f5f0;
            border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            animation: photoCarousel 8s infinite ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes photoCarousel {
            0% {
                opacity: 0;
                transform: translateX(-100px) rotateZ(-15deg) scale(0.8);
            }
            15% {
                opacity: 1;
                transform: translateX(0) rotateZ(0deg) scale(1);
            }
            85% {
                opacity: 1;
                transform: translateX(0) rotateZ(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(100px) rotateZ(15deg) scale(0.8);
            }
        }

        .photo-item:nth-child(1) { animation-delay: 0s; }
        .photo-item:nth-child(2) { animation-delay: 1.6s; }
        .photo-item:nth-child(3) { animation-delay: 3.2s; }
        .photo-item:nth-child(4) { animation-delay: 4.8s; }
        .photo-item:nth-child(5) { animation-delay: 6.4s; }

        /* Navigation */
        .nav-button {
            position: absolute;
            bottom: 30px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #888;
            transition: color 0.3s ease;
            z-index: 10;
        }

        .nav-button:hover {
            color: #fff;
        }

        .nav-button.left {
            left: 30px;
        }

        .nav-button.right {
            right: 30px;
        }

        /* Hidden state */
        .hidden {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .photobook {
                flex-direction: column;
                height: auto;
            }

            .page-1, .page-2 {
                min-height: 500px;
            }

            .spiral-binding {
                width: 100%;
                height: 40px;
                left: 0;
                transform: none;
            }

            .spiral-ring {
                top: 50%;
                width: 16px;
                height: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="photobook">
        <!-- Spiral Binding -->
        <div class="spiral-binding" id="spiralBinding"></div>

        <!-- Page 1 -->
        <div class="page-1" id="page1">
            <div class="page-1-content">
                <div class="date-text">07.17.1996</div>
                <div 
                    class="made-with-love" 
                    onclick="document.getElementById('page1').classList.add('hidden'); document.getElementById('page2').classList.remove('hidden');"
                >
                    made with love
                </div>
                <div class="signature">love-notes</div>
            </div>
        </div>

        <!-- Page 2 -->
        <div class="page-2 hidden" id="page2">
            <div class="carousel-container">
                <div class="carousel">
                    <div class="photo-item">
                        <img src="photo1.jpg" alt="Photo 1" onerror="this.textContent='photo1.jpg'">
                    </div>
                    <div class="photo-item">
                        <img src="photo2.jpg" alt="Photo 2" onerror="this.textContent='photo2.jpg'">
                    </div>
                    <div class="photo-item">
                        <img src="photo3.jpg" alt="Photo 3" onerror="this.textContent='photo3.jpg'">
                    </div>
                    <div class="photo-item">
                        <img src="photo4.jpg" alt="Photo 4" onerror="this.textContent='photo4.jpg'">
                    </div>
                    <div class="photo-item">
                        <img src="photo5.jpg" alt="Photo 5" onerror="this.textContent='photo5.jpg'">
                    </div>
                </div>
            </div>
            <button class="nav-button left" onclick="document.getElementById('page2').classList.add('hidden'); document.getElementById('page1').classList.remove('hidden');">← back</button>
        </div>
    </div>

    <script>
        // Generate spiral rings
        const spiralBinding = document.getElementById('spiralBinding');
        for (let i = 0; i < 15; i++) {
            const ring = document.createElement('div');
            ring.className = 'spiral-ring';
            ring.style.top = (i * 40) + 'px';
            spiralBinding.appendChild(ring);
        }
    </script>
</body>
</html>
