<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook Photo Box</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        /* Spiral Notebook Binding */
        .binding {
            position: absolute;
            left: 49.5%;
            top: 0;
            width: 20px;
            height: 100%;
            background: linear-gradient(90deg, #333 0%, #555 50%, #333 100%);
            z-index: 10;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5), 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .binding::before,
        .binding::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: radial-gradient(circle at 30% 30%, #666, #222);
            border-radius: 50%;
            left: 2px;
        }

        .binding::before {
            top: 15%;
        }

        .binding::after {
            bottom: 15%;
        }

        /* Pages Container */
        .pages-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .page {
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #fefef8 0%, #f9f9f0 100%);
            padding: 60px 50px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.05);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Paper texture */
        .page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,.03) 2px,
                    rgba(0,0,0,.03) 4px
                );
            pointer-events: none;
        }

        #page1 {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }

        #page1.turn {
            clip-path: polygon(100% 0, 100% 0, 100% 100%, 100% 100%);
            opacity: 0;
        }

        #page2 {
            clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
            opacity: 0;
        }

        #page2.visible {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            opacity: 1;
        }

        /* Page 1 Content */
        .page1-content {
            position: relative;
            z-index: 5;
            text-align: center;
        }

        .date {
            color: #666;
            font-size: 18px;
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        .made-with-love {
            font-size: 48px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: inline-block;
            letter-spacing: 4px;
        }

        .made-with-love:hover {
            color: #e74c3c;
            transform: scale(1.05);
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }

        .heart {
            display: inline-block;
            color: #e74c3c;
            animation: heartbeat 0.6s infinite;
            margin: 0 5px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .signature {
            margin-top: 100px;
            color: #999;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* Page 2 - Carousel */
        #page2 {
            justify-content: flex-start;
            padding-top: 80px;
            overflow: hidden;
        }

        .carousel-container {
            position: relative;
            z-index: 5;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .carousel {
            display: flex;
            animation: scroll 20s linear infinite;
            gap: 20px;
        }

        @keyframes scroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-250%);
            }
        }

        .carousel:hover {
            animation-play-state: paused;
        }

        .photo-item {
            flex-shrink: 0;
            width: 220px;
            height: 280px;
            background: linear-gradient(135deg, #fff 0%, #f5f5f5 100%);
            border: 8px solid #fff;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(0, 0, 0, 0.1);
            transform: perspective(1000px) rotateY(var(--rotate, 0deg)) rotateZ(var(--tilt, 0deg));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #999;
            position: relative;
            overflow: hidden;
        }

        .photo-item:nth-child(1) { --rotate: -5deg; --tilt: -2deg; }
        .photo-item:nth-child(2) { --rotate: 3deg; --tilt: 1deg; }
        .photo-item:nth-child(3) { --rotate: -2deg; --tilt: -3deg; }
        .photo-item:nth-child(4) { --rotate: 4deg; --tilt: 2deg; }
        .photo-item:nth-child(5) { --rotate: -3deg; --tilt: -1deg; }
        .photo-item:nth-child(6) { --rotate: 2deg; --tilt: 3deg; }
        .photo-item:nth-child(7) { --rotate: -4deg; --tilt: 0deg; }
        .photo-item:nth-child(8) { --rotate: 5deg; --tilt: -2deg; }
        .photo-item:nth-child(9) { --rotate: -1deg; --tilt: 1deg; }
        .photo-item:nth-child(10) { --rotate: 3deg; --tilt: 2deg; }

        .photo-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
            opacity: 0;
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 20px;
            right: 30px;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            z-index: 15;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .back-btn.show {
            opacity: 1;
            pointer-events: all;
        }

        .back-btn:hover {
            background: #c0392b;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="binding"></div>

    <div class="pages-container">
        <!-- Page 1 -->
        <div class="page" id="page1">
            <div class="page1-content">
                <div class="date">07.17.1996</div>
                <div class="made-with-love" id="transitionBtn">
                    made with <span class="heart">❤</span> love
                </div>
                <div class="signature">— wonderland</div>
            </div>
        </div>

        <!-- Page 2 -->
        <div class="page" id="page2">
            <div class="carousel-container">
                <div class="carousel">
                    <div class="photo-item">📷 Photo 1</div>
                    <div class="photo-item">📷 Photo 2</div>
                    <div class="photo-item">📷 Photo 3</div>
                    <div class="photo-item">📷 Photo 4</div>
                    <div class="photo-item">📷 Photo 5</div>
                    <!-- Repeated for infinite effect -->
                    <div class="photo-item">📷 Photo 1</div>
                    <div class="photo-item">📷 Photo 2</div>
                    <div class="photo-item">📷 Photo 3</div>
                    <div class="photo-item">📷 Photo 4</div>
                    <div class="photo-item">📷 Photo 5</div>
                </div>
            </div>
        </div>
    </div>

    <button class="back-btn" id="backBtn">← Back</button>

    <script>
        const transitionBtn = document.getElementById('transitionBtn');
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const backBtn = document.getElementById('backBtn');

        transitionBtn.addEventListener('click', () => {
            page1.classList.add('turn');
            page2.classList.add('visible');
            backBtn.classList.add('show');
        });

        backBtn.addEventListener('click', () => {
            page1.classList.remove('turn');
            page2.classList.remove('visible');
            backBtn.classList.remove('show');
        });
    </script>

</body>
</html>
